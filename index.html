function getNextStatus(cat, cur, amt, budgeted) {
  var r = getRoute(cat);
  // DoA Matrix thresholds determine which approvers are needed
  // Budgeted: Plant Mgr <$50K, VP Ops <$100K, CFO consulted >$100K, CEO >$100K
  // Unbudgeted: Plant Mgr <$5K, VP Ops <$10K, CFO consulted >$10K, CEO >$10K, Gemspring >$20K
  var needsCEO = budgeted ? (amt > 100000) : (amt > 10000);
  var needsBoard = !budgeted && amt > 20000;

  var itChain = ["Draft","Pending VP IT","Pending CFO","Pending President","Pending CEO","Approved"];
  var opsChain = ["Draft","Pending VP Transformation","Pending CFO","Pending President","Pending CEO","Approved"];
  var crossChain = ["Draft","Pending VP IT","Pending VP Transformation","Pending CFO","Pending President","Pending CEO","Approved"];

  if (needsBoard) {
    itChain.splice(itChain.length - 1, 0, "Pending Board");
    opsChain.splice(opsChain.length - 1, 0, "Pending Board");
    crossChain.splice(crossChain.length - 1, 0, "Pending Board");
  }

  var chain = r === "it" ? itChain : r === "ops" ? opsChain : crossChain;
  var idx = chain.indexOf(cur);
  if (idx >= 0 && idx < chain.length - 1) return chain[idx + 1];
  return "Approved";
}

function getChainSteps(cat, st, amt, budgeted) {
  var r = getRoute(cat);
  var needsBoard = !budgeted && amt > 20000;
  var base = [{ r: "Project Manager", nm: "", d: true }];
  if (r === "it" || r === "cross") {
    base.push({ r: "VP of IT", nm: "Brad Selby", d: !["Draft","Pending VP IT"].includes(st) });
  }
  if (r === "ops" || r === "cross") {
    base.push({ r: "VP of Transformation", nm: "Brad Sostack", d: !["Draft","Pending VP IT","Pending VP Transformation"].includes(st) });
  }
  var cfoNote = budgeted ? "Consulted > $100K" : "Consulted > $10K";
  base.push({ r: "CFO", nm: "Tom Naddy - " + cfoNote, d: ["Pending President","Pending CEO","Pending Board","Approved","In Progress","Complete"].includes(st) });
  base.push({ r: "President", nm: "Gene Swindell", d: ["Pending CEO","Pending Board","Approved","In Progress","Complete"].includes(st) });
  var ceoNote = budgeted ? "Approves > $100K" : "Approves > $10K";
  base.push({ r: "CEO", nm: "Michael J. Puleo - " + ceoNote, d: ["Pending Board","Approved","In Progress","Complete"].includes(st) });
  if (needsBoard) {
    base.push({ r: "Board / Gemspring", nm: "Required: unbudgeted > $20K", d: st === "Approved" || st === "Complete" });
  }
  return base;
}

function Dashboard({ data }) {
  var d = data.projects;
  var tot = d.reduce(function(s, p) { return s + p.b; }, 0);
  var spent = d.reduce(function(s, p) { return s + p.sp; }, 0);
  var appr = d.filter(function(p) { return ["Approved","In Progress","Complete"].includes(p.st); });
  var pend = d.filter(function(p) { return p.st.startsWith("Pending"); });

  var byCat = {};
  d.forEach(function(p) { byCat[p.c] = (byCat[p.c] || 0) + p.b; });
  var catD = Object.entries(byCat).map(function(e) { return { name: e[0], value: e[1] }; }).sort(function(a, b) { return b.value - a.value; });

  var bySite = {};
  d.forEach(function(p) { bySite[p.s] = (bySite[p.s] || 0) + p.b; });
  var siteD = Object.entries(bySite).map(function(e) { return { name: e[0], value: e[1] }; }).sort(function(a, b) { return b.value - a.value; }).slice(0, 8);

  var qD = ["Q1","Q2","Q3","Q4"].map(function(name, i) {
    return {
      name: name,
      budget: d.reduce(function(s, p) { return s + p.q[i]; }, 0),
      spent: i === 0 ? d.reduce(function(s, p) { return s + Math.min(p.sp, p.q[0]); }, 0) : 0
    };
  });

  var stC = {};
  d.forEach(function(p) { stC[p.st] = (stC[p.st] || 0) + 1; });

  return (
    <div>
      <div style={{ marginBottom: 22 }}>
        <h2 style={{ fontSize: 18, fontWeight: 700, color: T.tx, margin: 0 }}>CapEx Dashboard</h2>
        <p style={{ fontSize: 11, color: T.dim, margin: "3px 0 0" }}>2026 Capital Expenditure — Apex Geotech Solutions</p>
      </div>

      <div style={{ display: "flex", gap: 12, marginBottom: 18, flexWrap: "wrap" }}>

function getApprover(st) {
  if (st === "Pending VP IT") return "Brad Selby";
  if (st === "Pending VP Transformation") return "Brad Sostack";
  if (st === "Pending CFO") return "Tom Naddy";
  if (st === "Pending President") return "Gene Swindell";
  if (st === "Pending CEO") return "Michael J. Puleo";
  if (st === "Pending Board") return "Gemspring Board";
  if (st === "Draft") return "Owner";
  return "";
}

function Pipeline({ data, onSel }) {
  var [flt, setFlt] = useState("All");
  var [aflt, setAflt] = useState("All");
  var [q, setQ] = useState("");
  var d = data.projects;
  var sts = ["All"].concat(Array.from(new Set(d.map(function(p) { return p.st; }))));

  var approverNames = [];
  d.forEach(function(p) {
    var a = getApprover(p.st);
    if (a && a !== "Owner" && approverNames.indexOf(a) < 0) approverNames.push(a);
  });
  approverNames.sort();
  var approverOpts = ["All", "Any Pending"].concat(approverNames);

  var rows = d
    .filter(function(p) { return flt === "All" || p.st === flt; })
    .filter(function(p) {
      if (aflt === "All") return true;
      if (aflt === "Any Pending") return p.st.indexOf("Pending") === 0;
      return getApprover(p.st) === aflt;
    })
    .filter(function(p) { return !q || p.n.toLowerCase().includes(q.toLowerCase()) || p.s.toLowerCase().includes(q.toLowerCase()) || p.o.toLowerCase().includes(q.toLowerCase()); })
    .sort(function(a, b) { return b.b - a.b; });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: T.tx, margin: 0 }}>CapEx Pipeline</h2>
          <p style={{ fontSize: 11, color: T.dim, margin: "3px 0 0" }}>{rows.length} of {d.length}</p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <select value={aflt} onChange={function(e) { setAflt(e.target.value); }}
            style={{ padding: "6px 8px", border: "1px solid " + T.bdr, borderRadius: 6, fontSize: 10, outline: "none", background: T.bg3, color: aflt !== "All" ? T.amb : T.dim, fontFamily: T.ff }}>
            {approverOpts.map(function(a) { return <option key={a} value={a}>{a === "All" ? "All Approvers" : a === "Any Pending" ? "Any Pending" : "Waiting on: " + a}</option>; })}
          </select>
          <div style={{ position: "relative" }}>
            <Search size={12} style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)", color: T.dim }} />
            <input placeholder="Search..." value={q} onChange={function(e) { setQ(e.target.value); }}
              style={{ padding: "6px 11px 6px 28px", border: "1px solid " + T.bdr, borderRadius: 6, fontSize: 11, width: 190, outline: "none", background: T.bg3, color: T.tx, fontFamily: T.ff }} />
          </div>
        </div>
      </div>
      <div style={{ display: "flex", gap: 4, marginBottom: 12, flexWrap: "wrap" }}>
        {sts.map(function(s) {
          return <button key={s} onClick={function() { setFlt(s); }} style={{ padding: "3px 11px", borderRadius: 5, border: flt === s ? "1.5px solid " + T.blu : "1px solid " + T.bdr, background: flt === s ? T.bg3 : T.bg2, color: flt === s ? T.blu : T.dim, fontSize: 10, cursor: "pointer", fontFamily: T.ff }}>{s}</button>;
        })}
      </div>
      <div style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 10, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ background: T.bg3 }}>
              {["ID","Initiative","Site","Category","Route","Budget","Status","Waiting On","Owner"].map(function(h) {
                return <th key={h} style={{ padding: "8px 10px", textAlign: "left", fontSize: 9, fontWeight: 600, color: T.dim, textTransform: "uppercase", letterSpacing: "0.05em", borderBottom: "1px solid " + T.bdr }}>{h}</th>;
              })}
            </tr>
          </thead>
          <tbody>
            {rows.map(function(p) {
              var approver = getApprover(p.st);
              var approverColor = approver ? T.amb : T.dim + "44";
              return (
                <tr key={p.id} onClick={function() { onSel(p); }} style={{ cursor: "pointer" }}
                  onMouseEnter={function(e) { e.currentTarget.style.background = T.bg3; }}
                  onMouseLeave={function(e) { e.currentTarget.style.background = "transparent"; }}>
                  <td style={{ padding: "9px 10px", fontSize: 10, color: T.dim, borderBottom: "1px solid " + T.bdr + "30" }}>{p.id}</td>
                  <td style={{ padding: "9px 10px", fontSize: 11, fontWeight: 600, color: T.tx, borderBottom: "1px solid " + T.bdr + "30" }}>{p.n}</td>
                  <td style={{ padding: "9px 10px", fontSize: 10, color: T.tx2, borderBottom: "1px solid " + T.bdr + "30" }}>{p.s}</td>
                  <td style={{ padding: "9px 10px", fontSize: 10, color: T.tx2, borderBottom: "1px solid " + T.bdr + "30" }}>{p.c}</td>
                  <td style={{ padding: "9px 10px", borderBottom: "1px solid " + T.bdr + "30" }}><Route cat={p.c} /></td>
                  <td style={{ padding: "9px 10px", fontSize: 10, fontWeight: 600, color: T.tx, borderBottom: "1px solid " + T.bdr + "30" }}>{p.b > 0 ? fF(p.b) : "\u2014"}</td>
                  <td style={{ padding: "9px 10px", borderBottom: "1px solid " + T.bdr + "30" }}><Badge st={p.st} /></td>
                  <td style={{ padding: "9px 10px", fontSize: 10, fontWeight: 600, color: approverColor, borderBottom: "1px solid " + T.bdr + "30" }}>{approver || "\u2014"}</td>
                  <td style={{ padding: "9px 10px", fontSize: 10, color: T.tx2, borderBottom: "1px solid " + T.bdr + "30" }}>{p.o}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Approvals({ data, onAction }) {
  var [cmt, setCmt] = useState({});
  var pend = data.projects.filter(function(p) { return p.st.startsWith("Pending"); });

  function act(p, a) {
    onAction(p.id, a, cmt[p.id] || "");
    setCmt(function(prev) { var n = Object.assign({}, prev); n[p.id] = ""; return n; });
  }

  if (pend.length === 0) {
    return (
      <div>
        <h2 style={{ fontSize: 18, fontWeight: 700, color: T.tx, margin: "0 0 20px" }}>Approval Queue</h2>
        <div style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 10, padding: 50, textAlign: "center" }}>
          <CheckCircle2 size={34} color={T.grn} />
          <div style={{ fontSize: 14, fontWeight: 600, color: T.tx, marginTop: 9 }}>All caught up</div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ marginBottom: 20 }}>
        <h2 style={{ fontSize: 18, fontWeight: 700, color: T.tx, margin: 0 }}>Approval Queue</h2>
        <p style={{ fontSize: 11, color: T.dim, margin: "3px 0 0" }}>{pend.length} items awaiting</p>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {pend.map(function(p) {
          var cfg = SC[p.st] || SC.Draft;
          return (
            <div key={p.id} style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 10, padding: "16px 20px", borderLeft: "3px solid " + cfg.c }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 5 }}>
                    <span style={{ fontSize: 10, color: T.dim }}>{p.id}</span>
                    <Badge st={p.st} />
                    <Route cat={p.c} />
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: T.tx }}>{p.n}</div>
                  <div style={{ display: "flex", gap: 12, marginTop: 7 }}>
                    <span style={{ fontSize: 10, color: T.dim }}>{p.s}</span>
                    <span style={{ fontSize: 10, color: T.dim }}>{p.o}</span>
                    <span style={{ fontSize: 10, color: T.dim }}>{p.c}</span>
                  </div>
                </div>
                <div style={{ fontSize: 18, fontWeight: 700, color: T.tx }}>{fF(p.b)}</div>
              </div>
              <div style={{ marginTop: 12, display: "flex", gap: 8, alignItems: "center" }}>
                <input placeholder="Comment (required for reject)..." value={cmt[p.id] || ""}
                  onChange={function(e) { var v = e.target.value; setCmt(function(prev) { var n = Object.assign({}, prev); n[p.id] = v; return n; }); }}
                  style={{ flex: 1, padding: "6px 11px", border: "1px solid " + T.bdr, borderRadius: 5, fontSize: 10, outline: "none", background: T.bg3, color: T.tx, fontFamily: T.ff }} />
                <button onClick={function() { act(p, "approve"); }} style={{ padding: "6px 14px", background: T.grn, color: T.bg, border: "none", borderRadius: 5, fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: T.ff }}>Approve</button>
                <button onClick={function() { if (cmt[p.id]) { act(p, "conditional"); } }} style={{ padding: "6px 14px", background: (cmt[p.id]) ? T.amb + "20" : T.bg3, color: (cmt[p.id]) ? T.amb : T.dim, border: "1px solid " + ((cmt[p.id]) ? T.amb + "50" : T.bdr), borderRadius: 5, fontSize: 9, fontWeight: 700, cursor: (cmt[p.id]) ? "pointer" : "not-allowed", fontFamily: T.ff }}>Conditional</button>
                <button onClick={function() { if (cmt[p.id]) { act(p, "reject"); } }} style={{ padding: "6px 14px", background: (cmt[p.id]) ? "transparent" : T.bg3, color: (cmt[p.id]) ? T.red : T.dim, border: "1px solid " + ((cmt[p.id]) ? T.red + "50" : T.bdr), borderRadius: 5, fontSize: 10, fontWeight: 700, cursor: (cmt[p.id]) ? "pointer" : "not-allowed", fontFamily: T.ff }}>Reject</button>
                <button onClick={function() { act(p, "hold"); }} style={{ padding: "6px 14px", background: "transparent", color: T.dim, border: "1px solid " + T.bdr, borderRadius: 5, fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: T.ff }}>Hold</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SubmitForm({ onSubmit }) {
  var empty = { name: "", entity: "OCI", site: "Brookville", cat: "Production Equipment", owner: "", cost: "", quarter: "Q2 2026", justification: "", budgeted: "Budgeted", roi: "", savings: "", urgency: "Standard", risk: "", docs: "" };
  var [f, setF] = useState(Object.assign({}, empty));
  var [done, setDone] = useState(null);
  function up(k, v) { setF(function(prev) { var n = Object.assign({}, prev); n[k] = v; return n; }); }

  var iS = { width: "100%", padding: "7px 11px", border: "1px solid " + T.bdr, borderRadius: 6, fontSize: 11, outline: "none", background: T.bg3, color: T.tx, fontFamily: T.ff, boxSizing: "border-box" };
  var lS = { fontSize: 9, fontWeight: 600, color: T.dim, marginBottom: 3, display: "block", textTransform: "uppercase", letterSpacing: "0.05em" };

  function go() {
    if (!f.name || !f.owner || !f.cost) return;
    var cost = parseFloat(f.cost) || 0;
    var qi = { "Q1 2026": 0, "Q2 2026": 1, "Q3 2026": 2, "Q4 2026": 3 }[f.quarter] || 1;
    var qa = [0, 0, 0, 0]; qa[qi] = cost;
    var isBudgeted = f.budgeted === "Budgeted";
    var id = onSubmit({ n: f.name, e: f.entity, s: f.site, c: f.cat, b: cost, sp: 0, o: f.owner, q: qa, t: f.quarter.replace(" 2026", ""), bg: isBudgeted, justification: f.justification, roi: f.roi, savings: f.savings, urgency: f.urgency, risk: f.risk, docs: f.docs });
    setDone(id);
    setF(Object.assign({}, empty));
  }

  if (done) {
    return (
      <div style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 10, padding: 50, textAlign: "center", maxWidth: 460, margin: "36px auto" }}>
        <CheckCircle2 size={24} color={T.grn} style={{ margin: "0 auto 12px", display: "block" }} />
        <div style={{ fontSize: 16, fontWeight: 700, color: T.tx }}>Request Submitted</div>
        <div style={{ fontSize: 11, color: T.dim, marginTop: 5 }}>Assigned <span style={{ color: T.amb, fontWeight: 600 }}>{done}</span></div>
        <button onClick={function() { setDone(null); }} style={{ marginTop: 16, padding: "7px 20px", background: T.blu, color: T.bg, border: "none", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: "pointer", fontFamily: T.ff }}>Submit Another</button>
      </div>
    );
  }

  var ok = f.name && f.owner && f.cost;
  return (
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, color: T.tx, margin: "0 0 20px" }}>Submit CapEx Request</h2>
      <div style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 10, padding: "22px 26px", maxWidth: 680 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <div style={{ gridColumn: "1/-1" }}><label style={lS}>Project Name *</label><input style={iS} value={f.name} onChange={function(e) { up("name", e.target.value); }} /></div>
          <div><label style={lS}>Entity</label><select style={iS} value={f.entity} onChange={function(e) { up("entity", e.target.value); }}>{ENTITIES.map(function(o) { return <option key={o}>{o}</option>; })}</select></div>
          <div><label style={lS}>Site</label><select style={iS} value={f.site} onChange={function(e) { up("site", e.target.value); }}>{SITES.map(function(o) { return <option key={o}>{o}</option>; })}</select></div>
          <div><label style={lS}>Category (determines routing)</label><select style={iS} value={f.cat} onChange={function(e) { up("cat", e.target.value); }}>{CATS.map(function(o) { return <option key={o}>{o}</option>; })}</select></div>
          <div><label style={lS}>Project Manager *</label><input style={iS} value={f.owner} onChange={function(e) { up("owner", e.target.value); }} /></div>
          <div><label style={lS}>Equipment Cost * ($)</label><input style={iS} type="number" value={f.cost} onChange={function(e) { up("cost", e.target.value); }} /></div>
          <div><label style={lS}>Target Quarter</label><select style={iS} value={f.quarter} onChange={function(e) { up("quarter", e.target.value); }}>{["Q1 2026","Q2 2026","Q3 2026","Q4 2026"].map(function(o) { return <option key={o}>{o}</option>; })}</select></div>
          <div><label style={lS}>Budget Status *</label><select style={iS} value={f.budgeted} onChange={function(e) { up("budgeted", e.target.value); }}><option>Budgeted</option><option>Unbudgeted</option></select></div>
          <div><label style={lS}>Urgency</label><select style={iS} value={f.urgency} onChange={function(e) { up("urgency", e.target.value); }}>{["Standard","High - Current Quarter","Critical - Safety/Compliance","Emergency"].map(function(o) { return <option key={o}>{o}</option>; })}</select></div>
          <div><label style={lS}>Expected ROI / Payback</label><input style={iS} value={f.roi} onChange={function(e) { up("roi", e.target.value); }} placeholder="e.g., 18 months, 2.5x, $50K/yr savings" /></div>
          <div><label style={lS}>Expected Annual Savings ($)</label><input style={iS} type="number" value={f.savings} onChange={function(e) { up("savings", e.target.value); }} placeholder="0" /></div>
          <div style={{ gridColumn: "1/-1" }}><label style={lS}>Risk if Not Approved / Delayed</label><textarea style={Object.assign({}, iS, { height: 44, resize: "vertical" })} value={f.risk} onChange={function(e) { up("risk", e.target.value); }} placeholder="What happens if this doesn't get done..." /></div>
          <div style={{ gridColumn: "1/-1" }}><label style={lS}>Business Justification *</label><textarea style={Object.assign({}, iS, { height: 60, resize: "vertical" })} value={f.justification} onChange={function(e) { up("justification", e.target.value); }} /></div>
          <div style={{ gridColumn: "1/-1" }}><label style={lS}>Linked Documents (paste SharePoint URLs, one per line)</label><textarea style={Object.assign({}, iS, { height: 44, resize: "vertical" })} value={f.docs} onChange={function(e) { up("docs", e.target.value); }} placeholder="https://ocidiv0.sharepoint.com/... (vendor quote, ROI, SOW)" /></div>
        </div>
        {f.cat && (
          <div style={{ marginTop: 12, padding: "10px 14px", background: routeColor(getRoute(f.cat)) + "10", border: "1px solid " + routeColor(getRoute(f.cat)) + "30", borderRadius: 6 }}>
            <div style={{ fontSize: 10, color: routeColor(getRoute(f.cat)), fontWeight: 600, marginBottom: 4 }}>Routes via {routeLabel(getRoute(f.cat))}</div>
            {f.cost && f.budgeted && (
              <div style={{ fontSize: 9, color: T.dim, lineHeight: 1.6 }}>
                {f.budgeted === "Unbudgeted" && parseFloat(f.cost) > 20000 ? "DoA: Unbudgeted > $20K requires Gemspring board approval" : f.budgeted === "Unbudgeted" && parseFloat(f.cost) > 10000 ? "DoA: Unbudgeted > $10K requires CEO approval" : f.budgeted === "Budgeted" && parseFloat(f.cost) > 100000 ? "DoA: Budgeted > $100K requires CEO approval, CFO consulted" : "DoA: Within standard approval thresholds"}
              </div>
            )}
          </div>
        )}
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
          <button onClick={go} style={{ padding: "7px 20px", background: ok ? T.blu : T.bg3, color: ok ? T.bg : T.dim, border: "none", borderRadius: 6, fontSize: 11, fontWeight: 700, cursor: ok ? "pointer" : "not-allowed", fontFamily: T.ff }}>Submit for Approval</button>
        </div>
      </div>
    </div>
  );
}

function DetailPanel({ p, onClose, onAction }) {
  var [cmt, setCmt] = useState("");
  if (!p) return null;
  var steps = getChainSteps(p.c, p.st, p.b, p.bg !== false);
  steps[0].nm = p.o;
  var r = getRoute(p.c);

        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 5 }}>

function ExportPage({ data }) {
  var d = data.projects;

  function exportCSV() {
    var h = ["ID","Project","Entity","Site","Category","Route","Budget","Spent","Status","Owner","Q1","Q2","Q3","Q4"];
    var rows = d.map(function(p) {
      return [p.id, '"' + p.n + '"', p.e, p.s, p.c, routeLabel(getRoute(p.c)), p.b, p.sp, p.st, p.o, p.q[0], p.q[1], p.q[2], p.q[3]].join(",");
    });
    var csv = h.join(",") + "\n" + rows.join("\n");
    var blob = new Blob([csv], { type: "text/csv" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "capex-pipeline.csv";
    a.click();
    URL.revokeObjectURL(url);
  }

  var card = { background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 10, padding: "18px 22px", cursor: "pointer" };

    <div style={{ maxWidth: 720 }}>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <div onClick={exportCSV} style={card}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
            <Download size={16} color={T.grn} />
            <span style={{ fontSize: 12, fontWeight: 700, color: T.tx }}>Export CSV</span>

          <div style={{ fontSize: 10, color: T.dim }}>Full pipeline for Excel, Power BI, Monday.com</div>

            <span style={{ fontSize: 12, fontWeight: 700, color: T.tx }}>Integration Targets</span>
          </div>
          <div style={{ fontSize: 10, color: T.dim }}>Power BI, Monday.com, 13-Week CF, SharePoint</div>
        </div>
      </div>
    </div>
  );
}

function SpendTracker({ data, onUpdate }) {
  var [selProj, setSelProj] = useState("all");
  var [showForm, setShowForm] = useState(false);
  var [nv, setNv] = useState({ vendor: "", desc: "", amount: "", date: "", po: "", inv: "", projectId: "", hasReceipt: false });

  var expenses = (data && data.expenses) ? data.expenses : [];
  var activeProjects = data.projects.filter(function(p) { return ["Approved","In Progress","Complete"].indexOf(p.st) >= 0; });
  var filtered = selProj === "all" ? expenses : expenses.filter(function(e) { return e.projectId === selProj; });
  filtered = filtered.slice().sort(function(a, b) { return b.date > a.date ? 1 : -1; });

  var totalLogged = filtered.reduce(function(s, e) { return s + e.amount; }, 0);
  var selProjData = selProj !== "all" ? data.projects.find(function(p) { return p.id === selProj; }) : null;
  var budgetForSel = selProjData ? selProjData.b : data.projects.reduce(function(s, p) { return s + p.b; }, 0);
  var spentForSel = totalLogged;
  var pctUsed = budgetForSel > 0 ? Math.min((spentForSel / budgetForSel) * 100, 100) : 0;
  var overBudget = spentForSel > budgetForSel;
  var missingReceipts = filtered.filter(function(e) { return !e.hasReceipt; }).length;

  var iS = { width: "100%", padding: "7px 9px", border: "1px solid " + T.bdr, borderRadius: 4, fontSize: 11, fontFamily: T.ff, outline: "none", background: T.bg3, color: T.tx, boxSizing: "border-box" };
  var lS = { fontSize: 9, fontWeight: 700, color: T.dim, fontFamily: T.ff, marginBottom: 3, display: "block", textTransform: "uppercase", letterSpacing: "0.08em" };

  function handleAdd() {
    if (!nv.vendor || !nv.amount || !nv.projectId) return;
    var ne = {
      id: Date.now(),
      vendor: nv.vendor,
      desc: nv.desc,
      amount: parseFloat(nv.amount),
      date: nv.date || new Date().toISOString().split("T")[0],
      po: nv.po,
      inv: nv.inv,
      projectId: nv.projectId,
      hasReceipt: nv.hasReceipt
    };
    var newExpenses = [ne].concat(expenses);
    var proj = data.projects.find(function(p) { return p.id === nv.projectId; });
    var projName = proj ? proj.n : nv.projectId;
    var nd = Object.assign({}, data, {
      expenses: newExpenses,
      log: data.log.concat([{ ts: now(), action: "Expense logged: " + fF(ne.amount) + " to " + ne.vendor + " for " + projName + " (" + nv.projectId + ")", user: "Brad Selby", comment: ne.desc }])
    });
    onUpdate(nd);
    setNv({ vendor: "", desc: "", amount: "", date: "", po: "", inv: "", projectId: "", hasReceipt: false });
    setShowForm(false);
  }

  function setField(field, val) {
    var obj = {};
    obj[field] = val;
    setNv(Object.assign({}, nv, obj));
  }

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700, color: T.tx, fontFamily: T.ff }}>Spend Tracker</div>
          <div style={{ fontSize: 11, color: T.dim, fontFamily: T.ff, marginTop: 2 }}>Log expenses, attach receipts, track actuals vs. budget</div>
        </div>
        <button onClick={function() { setShowForm(!showForm); }} style={{
          padding: "7px 16px", background: showForm ? T.red + "18" : T.grn + "18",
          color: showForm ? T.red : T.grn, border: "1px solid " + (showForm ? T.red : T.grn) + "44",
          borderRadius: 5, fontSize: 10, fontWeight: 700, fontFamily: T.ff, cursor: "pointer"
        }}>{showForm ? "Cancel" : "+ Log Expense"}</button>
      </div>

      {showForm && (
        <div style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 8, padding: "18px 20px", marginBottom: 16, borderLeft: "3px solid " + T.grn }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: T.tx, fontFamily: T.ff, marginBottom: 14 }}>New Expense Entry</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
            <div>
              <label style={lS}>Project *</label>
              <select style={iS} value={nv.projectId} onChange={function(e) { setField("projectId", e.target.value); }}>
                <option value="">Select project...</option>
                {activeProjects.map(function(pr) { return <option key={pr.id} value={pr.id}>{pr.id + " - " + pr.n}</option>; })}
              </select>
            </div>
            <div>
              <label style={lS}>Vendor *</label>
              <input style={iS} value={nv.vendor} onChange={function(e) { setField("vendor", e.target.value); }} placeholder="e.g., CDW, Dell, Bescutter" />
            </div>
            <div>
              <label style={lS}>Amount *</label>
              <input style={iS} type="number" value={nv.amount} onChange={function(e) { setField("amount", e.target.value); }} placeholder="$0" />
            </div>
            <div>
              <label style={lS}>Description</label>
              <input style={iS} value={nv.desc} onChange={function(e) { setField("desc", e.target.value); }} placeholder="What was purchased" />
            </div>
            <div>
              <label style={lS}>PO #</label>
              <input style={iS} value={nv.po} onChange={function(e) { setField("po", e.target.value); }} placeholder="PO-2026-XXX" />
            </div>
            <div>
              <label style={lS}>Invoice #</label>
              <input style={iS} value={nv.inv} onChange={function(e) { setField("inv", e.target.value); }} placeholder="Vendor invoice #" />
            </div>
            <div>
              <label style={lS}>Date</label>
              <input style={iS} type="date" value={nv.date} onChange={function(e) { setField("date", e.target.value); }} />
            </div>
            <div style={{ display: "flex", alignItems: "flex-end" }}>
              <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10, color: T.dim, fontFamily: T.ff, cursor: "pointer", padding: "7px 0" }}>
                <input type="checkbox" checked={nv.hasReceipt} onChange={function(e) { setField("hasReceipt", e.target.checked); }} />
                Receipt attached
              </label>
            </div>
            <div style={{ display: "flex", alignItems: "flex-end" }}>
              <button onClick={handleAdd} style={{
                padding: "8px 20px", background: T.grn + "18", color: T.grn,
                border: "1px solid " + T.grn + "44", borderRadius: 5,
                fontSize: 10, fontWeight: 700, fontFamily: T.ff, cursor: "pointer", width: "100%"
              }}>Save Entry</button>
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
        <div style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 8, padding: "14px 16px", flex: "0 0 210px" }}>
          <div style={{ fontSize: 9, color: T.dim, fontFamily: T.ff, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 8 }}>Filter by Project</div>
          <select style={Object.assign({}, iS, { width: "100%" })} value={selProj} onChange={function(e) { setSelProj(e.target.value); }}>
            <option value="all">All Projects</option>
            {activeProjects.map(function(pr) { return <option key={pr.id} value={pr.id}>{pr.id + " " + pr.n}</option>; })}
          </select>
        </div>
        <div style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 8, padding: "14px 16px", flex: 1 }}>
          <div style={{ display: "flex", gap: 24, alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 9, color: T.dim, fontFamily: T.ff, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>Budget</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: T.tx, fontFamily: T.ff }}>{fF(budgetForSel)}</div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: T.dim, fontFamily: T.ff, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>Spent</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: T.amb, fontFamily: T.ff }}>{fF(spentForSel)}</div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: T.dim, fontFamily: T.ff, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>Remaining</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: overBudget ? T.red : T.grn, fontFamily: T.ff }}>{fF(budgetForSel - spentForSel)}</div>
            </div>
            {missingReceipts > 0 && (
              <div>
                <div style={{ fontSize: 9, color: T.dim, fontFamily: T.ff, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>Missing Receipts</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: T.red, fontFamily: T.ff }}>{missingReceipts}</div>
              </div>
            )}
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                <span style={{ fontSize: 9, color: T.dim, fontFamily: T.ff }}>{pctUsed.toFixed(1) + "% utilized"}</span>
              </div>
              <div style={{ height: 7, background: T.bg3, borderRadius: 4 }}>
                <div style={{ height: "100%", width: pctUsed + "%", background: overBudget ? T.red : pctUsed > 80 ? T.amb : T.grn, borderRadius: 4 }} />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ background: T.bg2, border: "1px solid " + T.bdr, borderRadius: 8, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr>
              {["Date", "Project", "Vendor", "Description", "PO #", "Invoice #", "Amount", "Receipt"].map(function(h) {
                return <th key={h} style={{ padding: "9px 12px", textAlign: "left", fontSize: 9, fontWeight: 700, color: T.dim, fontFamily: T.ff, textTransform: "uppercase", letterSpacing: "0.08em", borderBottom: "1px solid " + T.bdr, background: T.bg3 }}>{h}</th>;
              })}
            </tr>
          </thead>
          <tbody>
            {filtered.map(function(e) {
              var proj = data.projects.find(function(p) { return p.id === e.projectId; });
              return (
                <tr key={e.id} onMouseEnter={function(ev) { ev.currentTarget.style.background = T.bg3; }} onMouseLeave={function(ev) { ev.currentTarget.style.background = "transparent"; }}>
                  <td style={{ padding: "8px 12px", fontSize: 10, color: T.dim, borderBottom: "1px solid " + T.bdr + "55", fontFamily: T.ff }}>{e.date}</td>
                  <td style={{ padding: "8px 12px", fontSize: 10, color: T.blu, borderBottom: "1px solid " + T.bdr + "55", fontFamily: T.ff }}>{proj ? proj.n : e.projectId}</td>
                  <td style={{ padding: "8px 12px", fontSize: 11, fontWeight: 600, color: T.tx, borderBottom: "1px solid " + T.bdr + "55", fontFamily: T.ff }}>{e.vendor}</td>
                  <td style={{ padding: "8px 12px", fontSize: 10, color: T.tx2, borderBottom: "1px solid " + T.bdr + "55", fontFamily: T.ff }}>{e.desc}</td>
                  <td style={{ padding: "8px 12px", fontSize: 10, color: T.dim, borderBottom: "1px solid " + T.bdr + "55", fontFamily: T.ff }}>{e.po || "--"}</td>
                  <td style={{ padding: "8px 12px", fontSize: 10, color: T.dim, borderBottom: "1px solid " + T.bdr + "55", fontFamily: T.ff }}>{e.inv || "--"}</td>
                  <td style={{ padding: "8px 12px", fontSize: 11, fontWeight: 700, color: T.amb, borderBottom: "1px solid " + T.bdr + "55", fontFamily: T.ff }}>{fF(e.amount)}</td>
                  <td style={{ padding: "8px 12px", borderBottom: "1px solid " + T.bdr + "55" }}>
                    {e.hasReceipt
                      ? <span style={{ color: T.grn, fontSize: 10, fontFamily: T.ff, fontWeight: 600 }}>Attached</span>
                      : <span style={{ color: T.red + "88", fontSize: 10, fontFamily: T.ff }}>Missing</span>
                    }
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length === 0 && (
          <div style={{ padding: 40, textAlign: "center", color: T.dim, fontSize: 11, fontFamily: T.ff }}>
            {selProj === "all" ? "No expenses logged yet. Click \"+ Log Expense\" to add your first entry." : "No expenses logged for this project yet."}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  var [data, setData] = useState(null);
  var [view, setView] = useState("dashboard");
  var [sel, setSel] = useState(null);
  var [loading, setLoading] = useState(true);
  var [ss, setSs] = useState(null);

  useEffect(function() {
    (async function() {
      try {
        var result = localStorage.getItem(SK);
        var parsed = JSON.parse(result);
        if (parsed && parsed.projects && parsed.projects.length > 0) {
          if (!parsed.expenses) { parsed.expenses = []; }
          setData(parsed);
        } else {
          throw new Error("empty");
        }
      } catch (e) {
        var s = initData();
        localStorage.setItem(SK, JSON.stringify(s));
        setData(s);
      }
      setLoading(false);
    })();
  }, []);

  var persist = useCallback(async function(nd) {
    setData(nd);
    setSs("saving");
    try {
      localStorage.setItem(SK, JSON.stringify(nd));
      setSs("saved");
    } catch (e) {
      setSs("error");
    }
    setTimeout(function() { setSs(null); }, 1500);
  }, []);

  var handleSubmit = useCallback(function(np) {
    var num = String(data.nextNum).padStart(3, "0");
    var id = "2026-" + num;
    var r = getRoute(np.c);
    var first = (r === "it" || r === "cross") ? "Pending VP IT" : "Pending VP Transformation";
    var proj = Object.assign({}, np, { id: id, st: first, bg: np.bg });
    var nd = {
      projects: data.projects.concat([proj]),
      log: data.log.concat([{ ts: now(), action: "Submitted: " + np.n + " (" + id + ") - " + fF(np.b), user: "Brad Selby", comment: np.justification || "" }]),
      nextNum: data.nextNum + 1,
      expenses: data.expenses || []
    };
    persist(nd);
    return id;
  }, [data, persist]);

  var handleAction = useCallback(function(pid, action, comment) {
    var newP = data.projects.map(function(p) {
      if (p.id !== pid) return p;
      var ns = p.st;
      if (action === "approve" || action === "conditional") ns = getNextStatus(p.c, p.st, p.b, p.bg !== false);
      else if (action === "reject") ns = "Rejected";
      else if (action === "hold") ns = "On Hold";
      var updated = Object.assign({}, p, { st: ns });
      if (action === "conditional") updated.condition = comment;
      return updated;
    });
    var proj = data.projects.find(function(p) { return p.id === pid; });
    var lbl = action === "approve" ? "Approved" : action === "conditional" ? "Approved with Condition" : action === "reject" ? "Rejected" : "Put on Hold";
    var nd = {
      projects: newP,
      log: data.log.concat([{ ts: now(), action: lbl + ": " + proj.n + " (" + pid + ") from " + proj.st, user: "Brad Selby", comment: comment || "" }]),
      nextNum: data.nextNum,
      expenses: data.expenses || []
    };
    persist(nd);
    if (sel && sel.id === pid) setSel(newP.find(function(p) { return p.id === pid; }));
  }, [data, sel, persist]);

  var handleReset = useCallback(async function() {
    var s = initData();
    await persist(s);
    setSel(null);
  }, [persist]);

  if (loading || !data) {
    return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: T.bg, fontFamily: T.ff, color: T.dim }}>Loading...</div>;
  }

  var navItems = [
    { id: "dashboard", l: "Dashboard", i: LayoutDashboard },
    { id: "pipeline", l: "Pipeline", i: ListChecks },
    { id: "spend", l: "Spend Tracker", i: Receipt },
    { id: "approvals", l: "Approvals", i: CheckCircle2 },
    { id: "submit", l: "New Request", i: PlusCircle },
    { id: "exports", l: "Export", i: Download },
    { id: "log", l: "Activity", i: Activity },
    { id: "howto", l: "How To", i: BookOpen }
  ];
  var pc = data.projects.filter(function(p) { return p.st.startsWith("Pending"); }).length;

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: T.ff, background: T.bg, color: T.tx }}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

      <div style={{ width: 200, background: T.bg2, borderRight: "1px solid " + T.bdr, display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "18px 16px 14px", borderBottom: "1px solid " + T.bdr }}>
          <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
            <Shield size={14} color={T.amb} />
            <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: "0.1em", color: T.dim, textTransform: "uppercase" }}>Apex Geotech</span>
          </div>
          <div style={{ fontSize: 14, fontWeight: 700, color: T.tx, marginTop: 3 }}>CapEx Manager</div>
        </div>

        <nav style={{ padding: "9px 7px", flex: 1 }}>
          {navItems.map(function(item) {
            var Icon = item.i;
            return (
              <button key={item.id} onClick={function() { setView(item.id); setSel(null); }}
                style={{
                  display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "8px 10px",
                  border: "none", borderRadius: 5,
                  background: view === item.id ? T.bg3 : "transparent",
                  color: view === item.id ? T.tx : T.dim,
                  fontSize: 11, fontWeight: view === item.id ? 600 : 500,
                  cursor: "pointer", textAlign: "left", marginBottom: 1, fontFamily: T.ff,
                  borderLeft: view === item.id ? "2px solid " + T.blu : "2px solid transparent"
                }}>
                <Icon size={14} />
                {item.l}
                {item.id === "approvals" && pc > 0 && (
                  <span style={{ marginLeft: "auto", background: T.red, color: T.bg, borderRadius: 9, padding: "0px 6px", fontSize: 9, fontWeight: 700 }}>{pc}</span>
                )}
              </button>
            );
          })}
        </nav>

        <div style={{ padding: "10px 14px", borderTop: "1px solid " + T.bdr }}>
          {ss && (
            <div style={{ fontSize: 9, color: ss === "saved" ? T.grn : ss === "error" ? T.red : T.amb, marginBottom: 6, display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 5, height: 5, borderRadius: "50%", background: ss === "saved" ? T.grn : ss === "error" ? T.red : T.amb }} />
              {ss === "saved" ? "Saved" : ss === "error" ? "Save failed" : "Saving..."}
            </div>
          )}
          <button onClick={handleReset} style={{ display: "flex", alignItems: "center", gap: 6, width: "100%", padding: "6px 8px", border: "1px solid " + T.bdr, borderRadius: 5, background: "transparent", color: T.dim, fontSize: 9, cursor: "pointer", fontFamily: T.ff, marginBottom: 8 }}>
            <RefreshCw size={10} /> Reset Data
          </button>
          <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
            <div style={{ width: 30, height: 30, borderRadius: 6, background: T.bg3, border: "1px solid " + T.bdr, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, color: T.blu }}>BS</div>
            <div>
              <div style={{ fontSize: 11, fontWeight: 600 }}>Brad Selby</div>
              <div style={{ fontSize: 9, color: T.dim }}>VP of IT</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflow: "auto", padding: "24px 28px", position: "relative" }}>
        {view === "dashboard" && <Dashboard data={data} />}
        {view === "pipeline" && <Pipeline data={data} onSel={setSel} />}
        {view === "spend" && <SpendTracker data={data} onUpdate={persist} />}
        {view === "approvals" && <Approvals data={data} onAction={handleAction} />}
        {view === "submit" && <SubmitForm onSubmit={handleSubmit} />}
        {view === "exports" && <ExportPage data={data} />}
        {view === "log" && <ActivityLog data={data} />}
        {view === "howto" && <HowToPage />}
      </div>

      {sel && <DetailPanel p={sel} onClose={function() { setSel(null); }} onAction={handleAction} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
